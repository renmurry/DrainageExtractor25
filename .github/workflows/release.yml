name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Bundle WhiteboxTools
        run: python scripts/fetch_whitebox.py

      - name: Build one-file exe
        run: pyinstaller DrainageExtractor.spec --noconfirm

      - name: Smoke test
        run: dist/DrainageExtractor.exe --version

      - name: Attach exe to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DrainageExtractor.exe
          generate_release_notes: true
